<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartel - Sistema de Lavagem</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#1b1b1b;
    color:white;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1,h2{text-align:center;}

label{display:block;margin-top:12px;}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    cursor:pointer;
    color:white;
    font-size:15px;
}

button:hover{opacity:0.9;}

.lavagem-card{
    background:#2a2a2a;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    border-left:4px solid #2ecc71;
}

#lista{
    max-height:350px;
    overflow-y:auto;
    background:#1f1f1f;
    padding:10px;
    border-radius:10px;
    border:1px solid #333;
}

.painel{
    background:#2a2a2a;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
    border:1px solid #333;
}

.ranking{
    font-size:13px;
    color:#ddd;
}

/* =========================
   🔧 CORREÇÃO TOM SELECT
   ========================= */

.ts-wrapper{
    width:100%;
}

.ts-control{
    background:#2a2a2a !important;
    border:1px solid #333 !important;
    border-radius:8px !important;
    color:white !important;
    padding:12px !important;
    box-shadow:none !important;
}

.ts-control input{
    color:white !important;
}

.ts-dropdown{
    background:#2a2a2a !important;
    border:1px solid #333 !important;
    color:white !important;
}

.ts-dropdown .option{
    background:#2a2a2a !important;
    color:white !important;
}

.ts-dropdown .option:hover{
    background:#3a3a3a !important;
    color:white !important;
}
</style>
</head>

<body>

<h1>🧾 Sistema de Lavagem</h1>

<label>Número da Lavagem</label>
<input id="numeroLavagemInput" type="number" placeholder="Ex: 26">

<label>Facção solicitante</label>
<select id="faccao">
<option value="">Selecione</option>
<option>4M</option>
<option>B13</option>
<option>Blacklist</option>
<option>Brothers</option>
<option>Coronel</option>
<option>Cross & Guerra</option>
<option>Dendê</option>
<option>Guerra</option>
<option>HPI</option>
<option>Hospício</option>
<option>Legacy</option>
<option>Lowprofile</option>
<option>Malta</option>
<option>Mandrágora</option>
<option>MDC</option>
<option>Medelin</option>
<option>RV</option>
<option>Yolo</option>
</select>

<label>Passaporte para pagamento</label>
<input id="passaporte" placeholder="Digite o passaporte">

<label>Valor sujo</label>
<input id="valor" type="text" placeholder="Ex: 100.000">

<button onclick="calcular()">Registrar Lavagem</button>

<h2>📜 Histórico de Lavagens</h2>
<div id="lista"></div>

<h2>📊 Painel de Controle do Cartel</h2>

<div class="painel">
    📜 Total de lavagens: <span id="totalLavagens">0</span><br><br>
    💰 Total lavado: <span id="totalDinheiro">0</span><br><br>

    <strong>🏴 Ranking de Facções</strong>
    <div id="ranking" class="ranking">Sem dados ainda</div>
</div>

<script>
new TomSelect("#faccao",{create:false});

let registros = JSON.parse(localStorage.getItem("registros")) || [];
let numero = localStorage.getItem("numeroLavagem");
numero = numero ? Number(numero) : 26;

function converter(v){
    return Number(v.replace(/\./g,""));
}

function formatar(v){
    return Number(v).toLocaleString("pt-BR");
}

function enviarDiscord(r){

    fetch("https://discord.com/api/webhooks/1519147289036193972/WreVR0l-ZJ7GbI7xiGUMdi-2k6P64hem0GmnH4dyGHGvlt0neVrf88mAIzaciy2Frjsm", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            embeds:[{
                title:`🧾 Solicitação de Lavagem Nº ${r.numero}`,
                color:0x2ecc71,
                fields:[
                    {name:"Facção solicitante", value:r.faccao || "—", inline:false},
                    {name:"Passaporte para pagamento", value:String(r.passaporte), inline:false},
                    {name:"Valor sujo", value:formatar(r.valorSujo), inline:false},
                    {name:"Valor limpo", value:formatar(r.valorLimpo), inline:false}
                ],
                footer:{text:"Sistema de Lavagem do Cartel"},
                timestamp:new Date().toISOString()
            }]
        })
    });
}

function calcular(){

    let faccao = document.getElementById("faccao").value;
    let passaporte = document.getElementById("passaporte").value.trim();
    let valor = document.getElementById("valor").value;
    let numInput = document.getElementById("numeroLavagemInput").value;

    if(!faccao || !passaporte || !valor){
        alert("Preencha todos os campos.");
        return;
    }

    let valorSujo = converter(valor);
    let valorLimpo = valorSujo * 0.80;

    let numFinal;

    if(numInput && !isNaN(numInput)){
        numFinal = Number(numInput);
    }else{
        numFinal = numero;
        numero++;
        localStorage.setItem("numeroLavagem", numero);
    }

    let registro = {
        numero:numFinal,
        faccao,
        passaporte,
        valorSujo,
        valorLimpo
    };

    registros.push(registro);

    localStorage.setItem("registros", JSON.stringify(registros));

    enviarDiscord(registro);

    atualizarTudo();

    document.getElementById("numeroLavagemInput").value="";
    document.getElementById("passaporte").value="";
    document.getElementById("valor").value="";
}

function excluir(i){
    if(!confirm("Excluir lavagem?")) return;

    registros.splice(i,1);
    localStorage.setItem("registros",JSON.stringify(registros));

    atualizarTudo();
}

function atualizarLista(){

    let lista = document.getElementById("lista");
    lista.innerHTML="";

    [...registros].reverse().forEach(r=>{

        let div=document.createElement("div");
        div.className="lavagem-card";

        div.innerHTML=
`🧾 Solicitação de Lavagem Nº ${r.numero}<br><br>

Facção solicitante: ${r.faccao}<br>
Passaporte para pagamento: ${r.passaporte}<br>
Valor sujo: ${formatar(r.valorSujo)}<br>
Valor limpo: ${formatar(r.valorLimpo)}<br><br>

<button onclick="excluir(${registros.indexOf(r)})" style="background:#e74c3c;">Excluir</button>`;

        lista.appendChild(div);
    });
}

function atualizarPainel(){

    document.getElementById("totalLavagens").innerText = registros.length;

    let total = registros.reduce((a,b)=>a+(b.valorSujo||0),0);

    document.getElementById("totalDinheiro").innerText =
        total.toLocaleString("pt-BR");

    let ranking={};

    registros.forEach(r=>{
        ranking[r.faccao]=(ranking[r.faccao]||0)+(r.valorSujo||0);
    });

    let ordenado=Object.entries(ranking).sort((a,b)=>b[1]-a[1]);

    document.getElementById("ranking").innerHTML =
        ordenado.length
        ? ordenado.map((r,i)=>`${i+1}. ${r[0]} — ${r[1].toLocaleString("pt-BR")}`).join("<br>")
        : "Sem dados ainda";
}

function atualizarTudo(){
    atualizarLista();
    atualizarPainel();
}

atualizarTudo();
</script>

</body>
</html>
