<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartel - Sistema de Lavagem</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="shortcut icon" href="logo.png" type="image/png">
<link rel="apple-touch-icon" href="logo.png">
<style>
.hero{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:stretch;
    height:100vh;
    padding:40px 20px;
    transform:translateY(-40px);
}

.hero h1{
    font-size:42px;
    font-weight:800;
    color:#fff;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:20px;
    text-align:center;
}

.hero button{
    margin-top:25px;
}
    
body{
    font-family:Arial;
    color:#fff;
    max-width:900px;
    margin:auto;
    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.75)),
    url("fundo-cartel.png");

    background-size: cover;
    background-position: center 5%;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

label{
    display:block;
    text-align:left;
    margin-top:12px;
    width:100%;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    background:#2a2a2a;
    color:#fff;
    box-sizing:border-box
}

button{
    background:#8B1E1E;
    cursor:pointer;
}

.painel,
.lavagem-card,
.painel-mensal{
    background: rgba(42,42,42,0.60);
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.lavagem-card{
    border-left: 4px solid #8B1E1E;
}

#lista{
    max-height:465px;
    overflow-y:auto;
    background:rgba(31,31,31,0.50);
    padding:10px;
    border-radius:12px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
}

#listaMensal{
    max-height:373px;
    overflow-y:auto;
    background:rgba(31,31,31,0.50);
    padding:10px;
    border-radius:12px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
}

.filtro-linha{
    display:flex;
    gap:10px
}

.filtro-linha div{
    flex:1
}

.semana-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px
}

.semana-box{
    background:rgba(31,31,31,0.50);
    padding:10px;
    border-radius:10px;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.08);
}

#rankingBox{
    height: 180px;
    overflow-y: auto;
    padding: 8px;
    margin-top: 10px;
    border-radius: 12px;
    background: rgba(31,31,31,0.50);
    box-sizing: border-box;
}

#rankingMensal{
    display:flex;
    flex-direction:column;
    gap:8px;
}

#rankingMensal .lavagem-card{
    margin:0;
    width:100%;
    height:50px;
    flex:0 0 50px;
    box-sizing:border-box;
}

/* ---------------- SCROLL TRANSPARENTE ---------------- */

/* Chrome / Edge / Android */
#lista::-webkit-scrollbar,
#listaMensal::-webkit-scrollbar,
#rankingBox::-webkit-scrollbar{
    width: 6px;
}

#lista::-webkit-scrollbar-track,
#listaMensal::-webkit-scrollbar-track,
#rankingBox::-webkit-scrollbar-track{
    background: transparent;
}

#lista::-webkit-scrollbar-thumb,
#listaMensal::-webkit-scrollbar-thumb,
#rankingBox::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
}

#lista::-webkit-scrollbar-thumb:hover,
#listaMensal::-webkit-scrollbar-thumb:hover,
#rankingBox::-webkit-scrollbar-thumb:hover{
    background: rgba(255,255,255,0.25);
}

/* Firefox */
#lista,
#listaMensal,
#rankingBox{
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.12) transparent;
}
</style>

<div class="hero">

<label>Número da Lavagem</label>
<input id="numeroLavagemInput" type="number" placeholder="Ex: 26 (Confira o discord antes)">

<label>Tipo de lavagem (Porcentagem):</label>
<select id="tipoLavagem">
    <option value="20" selected>20% — Acima de 5kk</option>
    <option value="25">25% — De 2.5kk a 5kk</option>

</select>
 
<label>Facção solicitante</label>
<select id="faccao">
    <option value="" selected disabled>Selecione a facção</option>
   <option>Alemanha</option>
   <option>B13</option>
   <option>Blacklist</option>
   <option>Cartel</option>
   <option>Colômbia</option>
   <option>Coronel</option>
   <option>Crias</option>
   <option>Cross & Guerra</option>
   <option>Dendê</option>
   <option>Evo</option>
   <option>França</option>
   <option>Gênesis</option>
   <option>Guerra</option>
   <option>HPI</option>

   <option>Inxuga Jelo</option>
   <option>Legacy</option>
   <option>Lowprofile</option>
   <option>Macallan</option>
   <option>Macanm</option>
   <option>Malta</option>
   <option>Mandrágora</option>

<label>Passaporte</label>
<input id="passaporte" placeholder="Insira o passaporte e primeiro nome para pagamento (Ex.: 1006 - Joaquim)">

<input id="valor" placeholder="Ex.: 1.000.000">

<button onclick="calcular()" style="
    font-weight:bold;
    background:#8B1E1E;
    color:white;
">
    Registrar Lavagem
</button>

</div>
    
<h2>📜 Histórico de Lavagens</h2>
<div id="lista"></div>

<h2>📊 Painel de Controle</h2>
<div class="painel">
📜 Nº total de lavagens: <span id="totalLavagens"></span><br>
💰 Valor total lavado: $ <span id="totalDinheiro"></span><br>
💸 Lucro total: R$ <span id="lucroTotal"></span>
</div>

<h2>📆 Controle mensal</h2>
<div class="painel">
<div class="filtro-linha">
<div><label>Mês</label><select id="filtroMes" onchange="atualizarMensal()"></select></div>
<div><label>Ano</label><select id="filtroAno" onchange="atualizarMensal()"></select></div>
</div>

<div id="semanasContainer" style="margin-top:15px"></div>

<br>📅 Mês: <span id="mesAtual"></span><br><br>
💰 Valor total lavado mensal: $ <span id="totalMensal"></span><br><br>
💸 Lucro mensal: R$ <span id="lucroMensal"></span><br><br>

<h2>🏆 Ranking mensal de facções</h2>

<div id="rankingBox">
    <div id="rankingMensal"></div>
</div>
    
<h2>📜 Registros de lavagens mensais </h2>
<div id="listaMensal"></div>
    
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7-5DJY3dGOiq71vgcpWJQgbWM9HOA2Ek",
  authDomain: "lavagem-cartel.firebaseapp.com",
  projectId: "lavagem-cartel",
  storageBucket: "lavagem-cartel.appspot.com",
  messagingSenderId: "35926730423",
  appId: "1:35926730423:web:2b7e72ee07fb76cd358f32"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let registros = [];

/* ---------------- DISCORD ---------------- */
function enviarDiscord(r){
    fetch("https://discord.com/api/webhooks/1519147289036193972/WreVR0l-ZJ7GbI7xiGUMdi-2k6P64hem0GmnH4dyGHGvlt0neVrf88mAIzaciy2Frjsm",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            embeds:[{
                title:`🧾 Solicitação de Lavagem Nº ${r.numero}`,
                color:3066993,
                description:
`**Tipo de lavagem (Porcentagem):** ${r.taxa}%
**Facção solicitante:** ${r.faccao}
**Passaporte:** ${r.passaporte}

💰 **Valores**
**Valor Sujo:** $ ${formatar(r.valorSujo)}
**Valor Limpo:** R$ ${formatar(r.valorLimpo)}`,
                footer:{
                    text:`Sistema • ${new Date().toLocaleString('pt-BR')}`
                }
            }]
        })
    });
}

/* ---------------- FORMAT ---------------- */
function formatar(v){
    return Number(v).toLocaleString('pt-BR');
}

/* ---------------- FILTROS ---------------- */
function initFiltros(){
    const mes = document.getElementById('filtroMes');
    const ano = document.getElementById('filtroAno');

    for(let i=1;i<=12;i++){
        mes.innerHTML += `<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`;
    }

    const atual = new Date().getFullYear();

    for(let i=atual+10;i>=2020;i--){
        ano.innerHTML += `<option>${i}</option>`;
    }

    mes.value = String(new Date().getMonth()+1).padStart(2,'0');
    ano.value = atual;
}

/* ---------------- CALCULAR ---------------- */
async function calcular(){
    const data = new Date();

    const numero = document.getElementById("numeroLavagemInput").value;
    const faccao = document.getElementById("faccao").value;
    const passaporte = document.getElementById("passaporte").value;
    const valorTexto = document.getElementById("valor").value;

    if(!numero || !faccao || !passaporte || !valorTexto){
        alert("⚠️ Preencha todos os campos");
        return;
    }

    const tipo = Number(document.getElementById("tipoLavagem").value);
    const valor = Number(valorTexto.replace(/\./g,''));

    const valorLimpo = valor - (valor * tipo / 100);

    const r = {
        numero,
        taxa: tipo,
        faccao,
        passaporte,
        valorSujo: valor,
        valorLimpo,
        data: data.toLocaleString('pt-BR'),
        mes: String(data.getMonth()+1).padStart(2,'0'),
        ano: String(data.getFullYear()),
        semana: Math.ceil(data.getDate()/7)
    };

    await addDoc(collection(db,"lavagens"), r);

    enviarDiscord(r);
    await carregar();
}

window.calcular = calcular;
/* ---------------- CARREGAR ---------------- */
async function carregar(){
    const snap = await getDocs(collection(db,"lavagens"));

    registros = [];

    snap.forEach(d=>{
        registros.push({ id:d.id, ...d.data() });
    });

    atualizarTudo();
}

/* ---------------- EXCLUIR ---------------- */
async function excluir(id){
    await deleteDoc(doc(db,"lavagens",id));
    await carregar();
}

window.excluir = excluir;

/* ---------------- LISTA ---------------- */
function atualizarLista(){
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    [...registros].reverse().forEach(r=>{
        let lucroPercent = 0;

        if(r.taxa==20) lucroPercent=10;
        else if(r.taxa==25) lucroPercent=15;
        else if(r.taxa==30) lucroPercent=20;

        const lucro = r.valorSujo * (lucroPercent/100);

        lista.innerHTML += `
        <div class="lavagem-card">
            🧾 Solicitação de lavagem Nº ${r.numero}<br>
            📅 Data e hora: ${r.data || '-'}<br>
            📋 Tipo de lavagem (Porcentagem): ${r.taxa}%<br>
            🔫 Facção solicitante: ${r.faccao}<br>
            💵 Valor sujo: $ ${formatar(r.valorSujo)}<br>
            💸 Valor limpo: R$ ${formatar(r.valorLimpo)}<br>
            💰 Lucro: R$ ${formatar(lucro)}<br>

            <button onclick="excluir('${r.id}')"
            style="margin-top:10px;background:#8B1E1E;color:white;border:none;font-weight:bold;">
            Excluir</button>
        </div>`;
    });
}

/* ---------------- MENSAL ---------------- */
function atualizarMensal(){
    const mes = document.getElementById('filtroMes').value;
    const ano = document.getElementById('filtroAno').value;

    const mesAtual = document.getElementById('mesAtual');
    const totalMensal = document.getElementById('totalMensal');
    const lucroMensal = document.getElementById('lucroMensal');
    const semanasContainer = document.getElementById('semanasContainer');
    const listaMensal = document.getElementById('listaMensal');
    const rankingMensal = document.getElementById('rankingMensal');

    // 🔥 FILTRO DO MÊS
    const f = registros.filter(r =>
    String(r.mes) === String(mes) &&
    String(r.ano) === String(ano)
);
    // 🔥 LIMPA TUDO SEMPRE
    listaMensal.innerHTML = '';
    rankingMensal.innerHTML = '';
    semanasContainer.innerHTML = '';

    mesAtual.innerText = mes + '/' + ano;

    // 🚨 SE NÃO TEM DADOS, ZERA TUDO E PARA
    if (f.length === 0) {
        totalMensal.innerText = "0";
        lucroMensal.innerText = "0";

        semanasContainer.innerHTML = `<div class="lavagem-card">📅 Sem dados neste mês</div>`;
        listaMensal.innerHTML = `<div class="lavagem-card">📭 Sem registros neste mês</div>`;
        rankingMensal.innerHTML = `<div class="lavagem-card">🏆 Sem ranking neste mês</div>`;

        return;
    }

    // 💰 TOTAIS
const total = f.reduce((a, b) => a + b.valorSujo, 0);
totalMensal.innerText = formatar(total);

// lucro mensal correto (variável por taxa)
const lucroMensalTotal = f.reduce((a, r) => {
    let lucroPercent = 0;

    if (r.taxa == 20) lucroPercent = 10;
    else if (r.taxa == 25) lucroPercent = 15;
    else if (r.taxa == 30) lucroPercent = 20;

    return a + (r.valorSujo * (lucroPercent / 100));
}, 0);

lucroMensal.innerText = formatar(lucroMensalTotal);

// 📅 SEMANAS
let semanas = '';

for (let s = 1; s <= 5; s++) {

    const lucroSemana = f
        .filter(r => r.semana === s)
        .reduce((a, r) => {
            let lucroPercent = 0;

            if (r.taxa == 20) lucroPercent = 10;
            else if (r.taxa == 25) lucroPercent = 15;
            else if (r.taxa == 30) lucroPercent = 20;

            return a + (r.valorSujo * (lucroPercent / 100));
        }, 0);

    const t = f
        .filter(r => r.semana === s)
        .reduce((a, b) => a + b.valorSujo, 0);

    semanas += `
    <div class="semana-box">
        <strong>Semana ${s}</strong><br>
        💰 Lavado: $ ${formatar(t)}<br>
        💸 Lucro: R$ ${formatar(lucroSemana)}
    </div>`;
}

    semanasContainer.innerHTML = `<div class="semana-grid">${semanas}</div>`;

    // 📜 LISTA MENSAL
    [...f].reverse().forEach(r => {
        let lucroPercent = 0;

        if(r.taxa==20) lucroPercent=10;
        else if(r.taxa==25) lucroPercent=15;
        else if(r.taxa==30) lucroPercent=20;

        const lucro = r.valorSujo * (lucroPercent/100);

        listaMensal.innerHTML += `
        <div class="lavagem-card">
            🧾 Solicitação de lavagem Nº ${r.numero}<br>
            📅 Data e hora: ${r.data || '-'}<br>
            📋 Tipo de lavagem (Porcentagem): ${r.taxa}%<br>
            🔫 Facção solicitante: ${r.faccao}<br>
            💵 Valor sujo: $ ${formatar(r.valorSujo)}<br>
            💸 Valor limpo: R$ ${formatar(r.valorLimpo)}<br>
            💰 Lucro: R$ ${formatar(lucro)}<br>
        </div>`;
    });

    // 🏆 RANKING
    let ranking = {};

    f.forEach(r => {
        if(!ranking[r.faccao]){
            ranking[r.faccao] = { total:0, quantidade:0 };
        }

        ranking[r.faccao].total += Number(r.valorSujo);
        ranking[r.faccao].quantidade++;
    });

    const rankingOrdenado = Object.entries(ranking)
        .sort((a,b)=>b[1].total - a[1].total);

    rankingMensal.innerHTML = '';

    rankingOrdenado.forEach(([faccao, dados], index) => {

        let medalha = "";
        if(index === 0) medalha = "🥇";
        else if(index === 1) medalha = "🥈";
        else if(index === 2) medalha = "🥉";

        rankingMensal.innerHTML += `
        <div class="lavagem-card">
            ${medalha} <strong>${index+1}º</strong> — ${faccao} •
            ${dados.quantidade} ${dados.quantidade === 1 ? "lavagem" : "lavagens"} →
            💰 $ ${formatar(dados.total)}
        </div>`;
    });
}
/* ---------------- TUDO ---------------- */
function atualizarTudo(){
    document.getElementById('totalLavagens').innerText = registros.length;

    const total = registros.reduce((a,b)=>a + b.valorSujo,0);

    document.getElementById('totalDinheiro').innerText = formatar(total);

    // 💰 lucro total correto (por taxa)
    const lucroTotalGeral = registros.reduce((a, r) => {
        let lucroPercent = 0;

        if (r.taxa == 20) lucroPercent = 10;
        else if (r.taxa == 25) lucroPercent = 15;
        else if (r.taxa == 30) lucroPercent = 20;

        return a + (r.valorSujo * (lucroPercent / 100));
    }, 0);

    document.getElementById('lucroTotal').innerText = formatar(lucroTotalGeral);

    atualizarLista();
    atualizarMensal();
}

/* ---------------- INIT ---------------- */
initFiltros();
carregar();

window.calcular = calcular;
window.atualizarMensal = atualizarMensal;
window.atualizarTudo = atualizarTudo;
</script>
</body>
</html>
