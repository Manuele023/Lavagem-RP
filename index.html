<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Lavagem</title>
<style>
body{font-family:Arial;background:#1b1b1b;color:#fff;max-width:900px;margin:auto;padding:20px}
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;background:#2a2a2a;color:#fff;box-sizing:border-box}
button{background:#2ecc71;cursor:pointer}
.painel,.lavagem-card{background:#2a2a2a;padding:12px;border-radius:10px;margin-top:10px}
.lavagem-card{border-left:4px solid #2ecc71}
#lista,#listaMensal{max-height:300px;overflow-y:auto;background:#1f1f1f;padding:10px;border-radius:10px}
.filtro-linha{display:flex;gap:10px}
.filtro-linha div{flex:1}
.semana-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.semana-box{background:#1f1f1f;padding:10px;border-radius:8px}
</style>
</head>
<body>
<h1>🧾 Sistema de Lavagem</h1>

<label>Número</label><input id="numeroLavagemInput" type="number">
<label>Facção</label><input id="faccao">
<label>Passaporte</label><input id="passaporte">
<label>Valor Sujo</label><input id="valor">
<button onclick="calcular()">Registrar Lavagem</button>

<h2>📜 Histórico de Lavagens</h2>
<div id="lista"></div>

<h2>📊 Painel de Controle</h2>
<div class="painel">
📜 Total: <span id="totalLavagens"></span><br>
💰 Lavado: <span id="totalDinheiro"></span><br>
💸 Lucro: <span id="lucroTotal"></span>
</div>

<h2>📆 Registro Mensal</h2>
<div class="painel">
<div class="filtro-linha">
<div><label>Mês</label><select id="filtroMes" onchange="atualizarTudo()"></select></div>
<div><label>Ano</label><select id="filtroAno" onchange="atualizarTudo()"></select></div>
</div>

<div id="semanasContainer" style="margin-top:15px"></div>

<br>📅 Mês: <span id="mesAtual"></span><br><br>
💰 Total mensal: <span id="totalMensal"></span><br><br>
💸 Lucro mensal: <span id="lucroMensal"></span><br><br>

<strong>🏴 Ranking mensal</strong>
<div id="rankingMensal"></div>

<br><strong>📜 Lavagens do mês</strong>
<div id="listaMensal"></div>
</div>

<script>
let registros=JSON.parse(localStorage.getItem("registros"))||[];
let numero=Number(localStorage.getItem("numeroLavagem"))||26;

function enviarDiscord(r){

    fetch("https://discord.com/api/webhooks/1519147289036193972/WreVR0l-ZJ7GbI7xiGUMdi-2k6P64hem0GmnH4dyGHGvlt0neVrf88mAIzaciy2Frjsm",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            embeds:[{
                title:`🧾 Solicitação de Lavagem Nº ${r.numero}`,
                color:3066993,
                description:
`**Facção solicitante:** ${r.faccao}
**Passaporte:** ${r.passaporte}

💰 **Valores**
**Valor Sujo:** ${formatar(r.valorSujo)}
**Valor Limpo:** ${formatar(r.valorLimpo)}`,
                footer:{
                    text:"Sistema de Lavagem do Cartel"
                }
            }]
        })
    });

}
    
function formatar(v){return Number(v).toLocaleString('pt-BR')}

function initFiltros(){
let mes=document.getElementById('filtroMes');
for(let i=1;i<=12;i++) mes.innerHTML+=`<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`;
let atual=new Date().getFullYear();
for(let i=atual+10;i>=2020;i--) document.getElementById('filtroAno').innerHTML+=`<option>${i}</option>`;
mes.value=String(new Date().getMonth()+1).padStart(2,'0');
document.getElementById('filtroAno').value=atual;
}

function calcular(){
let data=new Date();
let r={
numero:document.getElementById('numeroLavagemInput').value||numero++,
faccao:document.getElementById('faccao').value,
passaporte:document.getElementById('passaporte').value,
valorSujo:Number(document.getElementById('valor').value.replace(/\./g,'')),
valorLimpo:Number(document.getElementById('valor').value.replace(/\./g,''))*0.8,
data:data.toLocaleString('pt-BR'),
mes:String(data.getMonth()+1).padStart(2,'0'),
ano:String(data.getFullYear()),
semana:Math.ceil(data.getDate()/7)
};
registros.push(r);
localStorage.setItem("registros",JSON.stringify(registros));
enviarDiscord(registro);
localStorage.setItem("numeroLavagem",numero);
atualizarTudo();
}

function excluir(i){
registros.splice(i,1);
localStorage.setItem("registros",JSON.stringify(registros));
atualizarTudo();
}

function atualizarLista(){
let lista=document.getElementById('lista'); lista.innerHTML='';
[...registros].reverse().forEach(r=>{
let idx=registros.indexOf(r);
lista.innerHTML+=`<div class="lavagem-card">🧾 Solicitação de lavagem Nº ${r.numero}<br>📅 ${r.data||'-'}<br>🔫 Facção solicitante: ${r.faccao}<br>💵 Valor sujo: ${formatar(r.valorSujo)}<br>💸 Valor limpo: ${formatar(r.valorLimpo)}<br><button onclick="excluir(${idx})">Excluir</button></div>`;
});
}

function atualizarMensal(){
let mes=filtroMes.value, ano=filtroAno.value;
let f=registros.filter(r=>r.mes===mes && r.ano===ano);
mesAtual.innerText=mes+'/'+ano;

let total=f.reduce((a,b)=>a+b.valorSujo,0);
totalMensal.innerText=formatar(total);
lucroMensal.innerText=formatar(total*0.1);

let semanas='';
for(let s=1;s<=5;s++){
let t=f.filter(r=>r.semana===s).reduce((a,b)=>a+b.valorSujo,0);
semanas+=`<div class="semana-box"><strong>Semana ${s}</strong><br><br>💰 Lavado: ${formatar(t)}<br>💸 Lucro: ${formatar(t*0.1)}</div>`;
}
semanasContainer.innerHTML=`<div class="semana-grid">${semanas}</div>`;

let rank={}; f.forEach(r=>rank[r.faccao]=(rank[r.faccao]||0)+r.valorSujo);
rankingMensal.innerHTML=Object.entries(rank).sort((a,b)=>b[1]-a[1]).map((r,i)=>`${i+1}. ${r[0]} — ${formatar(r[1])}`).join('<br>');

listaMensal.innerHTML='';
[...f].reverse().forEach(r=>{
listaMensal.innerHTML+=`<div class="lavagem-card">🧾 Solicitação de lavagem Nº ${r.numero}<br>📅 ${r.data||'-'}<br>🔫 Facção solicitante: ${r.faccao}<br>💵 Valor sujo: ${formatar(r.valorSujo)}<br>💸 Valor limpo: ${formatar(r.valorLimpo)}</div>`;
});
}

function atualizarTudo(){
totalLavagens.innerText=registros.length;
let total=registros.reduce((a,b)=>a+b.valorSujo,0);
totalDinheiro.innerText=formatar(total);
lucroTotal.innerText=formatar(total*0.1);
atualizarLista();
atualizarMensal();
}
initFiltros(); atualizarTudo();
</script>
</body></html>
