<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartel - Sistema de Lavagem</title>
<style>
.hero{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:stretch;
    height:100vh;
    padding:40px 20px;
    transform:translateY(-40px);
}

.hero h1{
    font-size:42px;
    font-weight:800;
    color:#fff;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:20px;
    text-align:center;
}

.hero button{
    margin-top:25px;
}
    
body{
    font-family:Arial;
    color:#fff;
    max-width:900px;
    margin:auto;
    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.75)),
    url("fundo-cartel.png");

    background-size: cover;
    background-position: center 5%;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

label{
    display:block;
    text-align:left;
    margin-top:12px;
    width:100%;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    background:#2a2a2a;
    color:#fff;
    box-sizing:border-box
}

button{
    background:#8B1E1E;
    cursor:pointer;
}

.painel,
.lavagem-card,
.painel-mensal{
    background: rgba(42,42,42,0.60);
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.lavagem-card{
    border-left: 4px solid #8B1E1E;
}

#lista,#listaMensal{
    max-height:300px;
    overflow-y:auto;
    background:rgba(31,31,31,0.50);
    padding:10px;
    border-radius:12px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
}

.filtro-linha{
    display:flex;
    gap:10px
}

.filtro-linha div{
    flex:1
}

.semana-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px
}

.semana-box{
    background:rgba(31,31,31,0.50);
    padding:10px;
    border-radius:10px;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.08);
}
</style>

<div class="hero">

<h1>Sistema de Lavagem</h1>

<label>Número da Lavagem</label>
<input id="numeroLavagemInput" type="number" placeholder="Ex: 26 (Confira o discord antes)">

<label>Tipo de lavagem (Porcentagem):</label>
<select id="tipoLavagem">
    <option value="20" selected>20% — Acima de 5kk</option>
    <option value="25">25% — De 2.5kk a 5kk</option>
    <option value="30">30% — Até 2.5kk</option>
</select>
 
<label>Facção solicitante</label>
<select id="faccao">
    <option value="" selected disabled>Selecione a facção</option>
    <option>4M</option>
    <option>B13</option>
    <option>Blacklist</option>
    <option>Brothers</option>
    <option>Coronel</option>
    <option>Cross & Guerra</option>
    <option>Dendê</option>
    <option>Guerra</option>
    <option>HPI</option>
    <option>Hospício</option>
    <option>Legacy</option>
    <option>Lowprofile</option>
    <option>Malta</option>
    <option>Mandrágora</option>
    <option>MDC</option>
    <option>Medelin</option>
    <option>RV</option>
    <option>Yolo</option>
    <option>Pista</option>
    <option>Facção nova e/ou não listada (Informar a Manu o nome)</option>
</select>
    
<label>Passaporte</label>
<input id="passaporte" placeholder="Insira o passaporte para pagamento">

<label>Valor sujo</label>
<input id="valor" placeholder="Ex.: 1.000.000">

<button onclick="calcular()" style="
    font-weight:bold;
    background:#8B1E1E;
    color:white;
">
    Registrar Lavagem
</button>

</div>
    
<h2>📜 Histórico de Lavagens</h2>
<div id="lista"></div>

<h2>📊 Painel de Controle</h2>
<div class="painel">
📜 Nº total de lavagens: <span id="totalLavagens"></span><br>
💰 Valor total lavado: $ <span id="totalDinheiro"></span><br>
💸 Lucro total: R$ <span id="lucroTotal"></span>
</div>

<h2>📆 Registro Mensal</h2>
<div class="painel">
<div class="filtro-linha">
<div><label>Mês</label><select id="filtroMes" onchange="atualizarTudo()"></select></div>
<div><label>Ano</label><select id="filtroAno" onchange="atualizarTudo()"></select></div>
</div>

<div id="semanasContainer" style="margin-top:15px"></div>

<br>📅 Mês: <span id="mesAtual"></span><br><br>
💰 Valor total lavado mensal: $ <span id="totalMensal"></span><br><br>
💸 Lucro mensal: R$ <span id="lucroMensal"></span><br><br>

<strong>🏴 Ranking mensal de facções</strong>
<div id="rankingMensal"></div>
    
</div>

<h2>📜 Registro de lavagem mensal</h2>
<div id="listaMensal"></div>
    
<script>
let registros=JSON.parse(localStorage.getItem("registros"))||[];
let numero=Number(localStorage.getItem("numeroLavagem"))||26;

function enviarDiscord(r){

    fetch("https://discord.com/api/webhooks/1519147289036193972/WreVR0l-ZJ7GbI7xiGUMdi-2k6P64hem0GmnH4dyGHGvlt0neVrf88mAIzaciy2Frjsm",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            embeds:[{
                title:`🧾 Solicitação de Lavagem Nº ${r.numero}`,
                color:3066993,
                description:
`**Facção solicitante:** ${r.faccao}
**Passaporte:** ${r.passaporte}

💰 **Valores**
**Valor Sujo:** $ ${formatar(r.valorSujo)}
**Valor Limpo:** R$ ${formatar(r.valorLimpo)}`,
                footer:{
                      text: `Sistema de Lavagem do Cartel • ${new Date().toLocaleDateString("pt-BR")} às ${new Date().toLocaleTimeString("pt-BR")}`
                }
            }]
        })
    });

}
    
function formatar(v){return Number(v).toLocaleString('pt-BR')}

function initFiltros(){
let mes=document.getElementById('filtroMes');
for(let i=1;i<=12;i++) mes.innerHTML+=`<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`;
let atual=new Date().getFullYear();
for(let i=atual+10;i>=2020;i--) document.getElementById('filtroAno').innerHTML+=`<option>${i}</option>`;
mes.value=String(new Date().getMonth()+1).padStart(2,'0');
document.getElementById('filtroAno').value=atual;
}

function calcular(){
    let data = new Date();

    let tipo = Number(document.getElementById("tipoLavagem").value);
    let valor = Number(document.getElementById('valor').value.replace(/\./g,''));

    let valorLimpo = valor - (valor * tipo / 100);

    let r = {
        numero: document.getElementById('numeroLavagemInput').value || numero++,
        taxa: tipo,
        faccao: document.getElementById('faccao').value,
        passaporte: document.getElementById('passaporte').value,
        valorSujo: valor,
        valorLimpo: valorLimpo,
        data: data.toLocaleString('pt-BR'),
        mes: String(data.getMonth() + 1).padStart(2,'0'),
        ano: String(data.getFullYear()),
        semana: Math.ceil(data.getDate()/7)
    };

    registros.push(r);
    localStorage.setItem("registros", JSON.stringify(registros));
    localStorage.setItem("numeroLavagem", numero);

    enviarDiscord(r);
    atualizarTudo();
}

function excluir(i){
registros.splice(i,1);
localStorage.setItem("registros",JSON.stringify(registros));
atualizarTudo();
}

function atualizarLista(){
let lista=document.getElementById('lista'); lista.innerHTML='';
[...registros].reverse().forEach(r=>{
let idx=registros.indexOf(r);
lista.innerHTML+=`<div class="lavagem-card">🧾 Solicitação de lavagem Nº ${r.numero}<br>📅 Data e hora: ${r.data||'-'}<br>📋 Tipo de lavagem (Porcentagem): {r.taxa}<br>🔫 Facção solicitante: ${r.faccao}<br>💵 Valor sujo: $ ${formatar(r.valorSujo)}<br>💸 Valor limpo: R$ ${formatar(r.valorLimpo)}<br><button onclick="excluir(${idx})" style="
font-weight:bold;
background:#8B1E1E;
color:white;
border:none;
box-shadow:0 4px 12px rgba(139,30,30,.35);
">
Excluir
</button></div>`;
});
}

function atualizarMensal(){
let mes=filtroMes.value, ano=filtroAno.value;
let f=registros.filter(r=>r.mes===mes && r.ano===ano);
mesAtual.innerText=mes+'/'+ano;

let total=f.reduce((a,b)=>a+b.valorSujo,0);
totalMensal.innerText=formatar(total);
lucroMensal.innerText=formatar(total*0.1);

let semanas='';
for(let s=1;s<=5;s++){
let t=f.filter(r=>r.semana===s).reduce((a,b)=>a+b.valorSujo,0);
 semanas += `
    <div class="semana-box">
        <strong>Semana ${s}</strong><br><br>

        💰 Lavado:<br>
        $ ${formatar(t)}<br><br>

        💸 Lucro:<br>
        R$ ${formatar(t * 0.1)}
    </div>
    `;
}
semanasContainer.innerHTML=`<div class="semana-grid">${semanas}</div>`;

let rank={}; f.forEach(r=>rank[r.faccao]=(rank[r.faccao]||0)+r.valorSujo);
rankingMensal.innerHTML=Object.entries(rank).sort((a,b)=>b[1]-a[1]).map((r,i)=>`${i+1}. ${r[0]} — $ ${formatar(r[1])}`).join('<br>');

listaMensal.innerHTML='';
[...f].reverse().forEach(r=>{
listaMensal.innerHTML+=`<div class="lavagem-card">🧾 Solicitação de lavagem Nº ${r.numero}<br>📅 Data e hora: ${r.data||'-'}<br>📋 Tipo de lavagem (Porcentagem): {r.taxa}<br>🔫 Facção solicitante: ${r.faccao}<br>💵 Valor sujo: $ ${formatar(r.valorSujo)}<br>💸 Valor limpo: R$ ${formatar(r.valorLimpo)}</div>`;
});
}

function atualizarTudo(){
totalLavagens.innerText=registros.length;
let total=registros.reduce((a,b)=>a+b.valorSujo,0);
totalDinheiro.innerText=formatar(total);
lucroTotal.innerText=formatar(total*0.1);
atualizarLista();
atualizarMensal();
}
initFiltros(); atualizarTudo();
</script>
</body></html>
